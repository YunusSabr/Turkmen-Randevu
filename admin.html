<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-box { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .login-box input { width: 100%; padding: 10px 12px; border: 0.5px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .login-box input:focus { border-color: #999; }
    .login-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-error { font-size: 13px; color: #e53935; margin-top: 8px; text-align: center; display: none; }
    .panel { display: none; }
    .topbar { background: #fff; border-bottom: 0.5px solid #e5e5e5; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 16px; font-weight: 600; }
    .logout-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .content { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-card .lbl { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-card .val { font-size: 24px; font-weight: 600; }
    .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 7px 14px; border-radius: 20px; border: 0.5px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; color: #888; transition: all 0.15s; }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .randevu-list { display: flex; flex-direction: column; gap: 10px; }
    .randevu-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; border: 0.5px solid #e5e5e5; }
    .randevu-card.onaylandi { border-left: 3px solid #4caf50; }
    .randevu-card.reddedildi { border-left: 3px solid #e53935; opacity: 0.6; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge.bekliyor { background: #fff8e1; color: #f57f17; }
    .badge.onaylandi { background: #e8f5e9; color: #2e7d32; }
    .badge.reddedildi { background: #ffebee; color: #c62828; }
    .card-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 12px; }
    .detail-item { font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px; }
    .detail-item i { font-size: 14px; color: #aaa; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-onayla { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #e8f5e9; color: #2e7d32; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 100px; }
    .btn-reddet { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #ffebee; color: #c62828; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 100px; }
    .btn-wp { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #e8f5e9; color: #1b5e20; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 100px; }
    .btn-wp-red { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #ffebee; color: #b71c1c; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 100px; }
    .btn-onayla:hover { background: #c8e6c9; }
    .btn-reddet:hover { background: #ffcdd2; }
    .btn-wp:hover { background: #c8e6c9; }
    .btn-wp-red:hover { background: #ffcdd2; }
    .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
    .loading { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
    @media (max-width: 600px) {
      .card-details { grid-template-columns: 1fr; }
      .content { padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="login-wrap" id="login-screen">
    <div class="login-box">
      <h1>Admin Girişi</h1>
      <p>Randevu yönetim paneli</p>
      <input type="password" id="sifre" placeholder="Şifre" onkeydown="if(event.key==='Enter') girisYap()" />
      <button class="login-btn" onclick="girisYap()">Giriş Yap</button>
      <div class="login-error" id="login-error">Hatalı şifre.</div>
    </div>
  </div>

  <div class="panel" id="panel">
    <div class="topbar">
      <h1>Randevu Paneli</h1>
      <button class="logout-btn" onclick="cikis()"><i class="ti ti-logout"></i> Çıkış</button>
    </div>
    <div class="content">
      <div class="stats">
        <div class="stat-card"><div class="lbl">Toplam</div><div class="val" id="stat-toplam">0</div></div>
        <div class="stat-card"><div class="lbl">Bekleyen</div><div class="val" id="stat-bekleyen">0</div></div>
        <div class="stat-card"><div class="lbl">Onaylanan</div><div class="val" id="stat-onaylanan">0</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filtrele('hepsi', this)">Hepsi</button>
        <button class="filter-btn" onclick="filtrele('bekliyor', this)">Bekleyen</button>
        <button class="filter-btn" onclick="filtrele('onaylandi', this)">Onaylanan</button>
        <button class="filter-btn" onclick="filtrele('reddedildi', this)">Reddedilen</button>
      </div>
      <div class="randevu-list" id="randevu-list">
        <div class="loading">Yükleniyor...</div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rjmvqgkvoopjgvtoiuwr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbXZxZ2t2b29wamd2dG9pdXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3ODgwMzAsImV4cCI6MjA5NjM2NDAzMH0.tLiTjTtNr8u89BggI4rGPakkuvaNCG14WEDkMR_4mkw';
    const ADMIN_SIFRE = 'Vakıfadmin123.';

    let tumRandevular = [];
    let aktifFiltre = 'hepsi';

    function girisYap() {
      const s = document.getElementById('sifre').value;
      if (s === ADMIN_SIFRE) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        randevulariYukle();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function cikis() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('panel').style.display = 'none';
      document.getElementById('sifre').value = '';
    }

    async function randevulariYukle() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/randevular?select=*&order=created_at.desc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      tumRandevular = await res.json();
      istatistikleriGuncelle();
      listeyiGoster();
    }

    function istatistikleriGuncelle() {
      document.getElementById('stat-toplam').textContent = tumRandevular.length;
      document.getElementById('stat-bekleyen').textContent = tumRandevular.filter(r => !r.durum || r.durum === 'bekliyor').length;
      document.getElementById('stat-onaylanan').textContent = tumRandevular.filter(r => r.durum === 'onaylandi').length;
    }

    function filtrele(filtre, el) {
      aktifFiltre = filtre;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      listeyiGoster();
    }

    function wpMesajAc(randevu, tip) {
      const tarih = randevu.tarih
        ? new Date(randevu.tarih).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
        : '—';

      let mesaj = '';
      if (tip === 'onay') {
        mesaj = `Sayın ${randevu.ad_soyad},\n\n✅ Randevunuz onaylanmıştır.\n\n📍 Mekan: ${randevu.mekan}\n🎉 Etkinlik: ${randevu.etkinlik}\n📅 Tarih: ${tarih}\n⏰ Saat: ${randevu.saat} (${randevu.sure})\n👥 Katılımcı: ${randevu.misafir_sayisi} kişi\n\nİyi etkinlikler dileriz. 🙏`;
      } else {
        mesaj = `Sayın ${randevu.ad_soyad},\n\n❌ Maalesef randevu talebiniz uygun görülmemiştir.\n\n📍 Mekan: ${randevu.mekan}\n🎉 Etkinlik: ${randevu.etkinlik}\n📅 Tarih: ${tarih}\n\nBaşka bir tarih için tekrar randevu oluşturabilirsiniz. Anlayışınız için teşekkür ederiz.`;
      }

      const telefon = randevu.telefon.replace(/\D/g, '');
      const url = `https://wa.me/${telefon}?text=${encodeURIComponent(mesaj)}`;
      window.open(url, '_blank');
    }

    function listeyiGoster() {
      const filtered = aktifFiltre === 'hepsi'
        ? tumRandevular
        : tumRandevular.filter(r => (r.durum || 'bekliyor') === aktifFiltre);

      const list = document.getElementById('randevu-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Randevu bulunamadı.</div>';
        return;
      }

      list.innerHTML = filtered.map(r => {
        const durum = r.durum || 'bekliyor';
        const tarih = r.tarih
          ? new Date(r.tarih).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
          : '—';

        const bekleyenButonlar = `
          <div class="card-actions">
            <button class="btn-onayla" onclick="durumGuncelle(${r.id}, 'onaylandi')"><i class="ti ti-check"></i> Onayla</button>
            <button class="btn-reddet" onclick="durumGuncelle(${r.id}, 'reddedildi')"><i class="ti ti-x"></i> Reddet</button>
          </div>`;

        const onaylandiButonlar = `
          <div class="card-actions">
            <button class="btn-wp" onclick='wpMesajAc(${JSON.stringify(r)}, "onay")'><i class="ti ti-brand-whatsapp"></i> Onay mesajı gönder</button>
          </div>`;

        const reddedildiButonlar = `
          <div class="card-actions">
            <button class="btn-wp-red" onclick='wpMesajAc(${JSON.stringify(r)}, "red")'><i class="ti ti-brand-whatsapp"></i> Red mesajı gönder</button>
          </div>`;

        return `
          <div class="randevu-card ${durum}" id="kart-${r.id}">
            <div class="card-top">
              <div>
                <div class="card-title">${r.etkinlik} — ${r.ad_soyad}</div>
                <div class="card-sub">${r.mekan}</div>
              </div>
              <span class="badge ${durum}">${durum === 'bekliyor' ? 'Bekliyor' : durum === 'onaylandi' ? 'Onaylandı' : 'Reddedildi'}</span>
            </div>
            <div class="card-details">
              <div class="detail-item"><i class="ti ti-calendar"></i>${tarih}</div>
              <div class="detail-item"><i class="ti ti-clock"></i>${r.saat || '—'} — ${r.sure || '—'}</div>
              <div class="detail-item"><i class="ti ti-users"></i>${r.misafir_sayisi || '—'} kişi</div>
              <div class="detail-item"><i class="ti ti-phone"></i>${r.telefon || '—'}</div>
            </div>
            ${r.notlar ? `<div style="font-size:12px;color:#888;margin-bottom:10px;padding:8px;background:#f9f9f7;border-radius:8px;">${r.notlar}</div>` : ''}
            ${durum === 'bekliyor' ? bekleyenButonlar : durum === 'onaylandi' ? onaylandiButonlar : reddedildiButonlar}
          </div>`;
      }).join('');
    }

    async function durumGuncelle(id, durum) {
      await fetch(`${SUPABASE_URL}/rest/v1/randevular?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ durum })
      });
      await randevulariYukle();

      const r = tumRandevular.find(x => x.id === id);
      if (r) wpMesajAc(r, durum === 'onaylandi' ? 'onay' : 'red');
    }
  </script>
</body>
</html>
